<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NIFTY OI Dashboard — Live</title>
<link rel="stylesheet" href="theme.css">
<link rel="stylesheet" href="oi-dashboard.css">
<!-- Butterfly tab styling — scoped here rather than in oi-dashboard.css
     since that file isn't guaranteed to already define these classes.
     Colors are hardcoded to match the C palette in oi-dashboard.js
     (canvas can't read CSS vars, so that file hardcodes hex too — this
     keeps the HTML-table Butterfly view visually consistent with the
     canvas views on the other 4 tabs). -->
<style>
  /* Top tabs row now holds the top-level tabs (left) and the mode row
     (right) on the same line — see .tabs-row in the markup below. */
  .tabs-row{ display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px 20px;
    margin:4px 0 0; border-bottom:1px solid rgba(255,255,255,0.08); padding:0 4px; flex:0 0 auto; }
  .tabs-row .tabs{ margin:0; border-bottom:none; padding:0; }

  .mode-tabs{ display:flex; align-items:center; gap:6px; padding-bottom:8px; }
  .win-group{ display:none; align-items:center; gap:6px; }
  .win-group.show{ display:flex; }
  .mode-tabs .sep{ width:1px; height:18px; background:rgba(255,255,255,0.12); margin:0 4px; }
  .win-tab{ padding:5px 11px; font-size:12px; font-weight:600; color:#8A94A6; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); border-radius:6px; cursor:pointer; user-select:none; }
  .win-tab.active{ color:#0B0E14; background:#FCC419; border-color:#FCC419; }
  .win-tab:hover{ color:#E8EDF2; }
  .mode-tab{ padding:6px 14px; font-size:13px; font-weight:600; color:#8A94A6; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); border-radius:6px; cursor:pointer; user-select:none; }
  .mode-tab.active{ color:#0B0E14; background:#4DABF7; border-color:#4DABF7; }
  .mode-tab:hover{ color:#E8EDF2; }

  .bfly-wrap{ display:none; flex-direction:column; height:100%; overflow:hidden; }
  .bfly-toolbar{ display:flex; align-items:center; justify-content:flex-end; gap:12px; padding:6px 6px 2px; flex-shrink:0; }
  .bfly-colhead{ display:grid; grid-template-columns:100px 1fr 100px 1fr 100px 70px; align-items:center; gap:10px; padding:6px 14px; font-size:12px; letter-spacing:.05em; color:#5E6B7E; flex-shrink:0; }
  .bfly-colhead span:nth-child(1){ text-align:right; }
  .bfly-colhead span:nth-child(3){ text-align:center; }
  .bfly-colhead span:nth-child(5){ text-align:left; }
  .bfly-body{ flex:1; min-height:0; overflow-y:auto; padding:0 6px; }
  .bfly-row{ display:grid; grid-template-columns:100px 1fr 100px 1fr 100px 70px; align-items:center; gap:10px; padding:6px 10px; }
  .bfly-row.bfly-atm{ background:rgba(252,196,25,0.08); border-radius:4px; }
  .bfly-fig{ font-family:'JetBrains Mono',monospace; font-size:14px; white-space:nowrap; }
  .bfly-fig.bfly-fig-ce{ text-align:right; }
  .bfly-fig.bfly-fig-pe{ text-align:left; }
  /* Combined mode shows a second, smaller line under the OI figure with
     the intraday OI change — stacked, not inline, so the fixed-width
     figure column never has to grow/reflow. */
  .bfly-fig.bfly-fig-combined{ display:flex; flex-direction:column; line-height:1.25; }
  .bfly-fig.bfly-fig-ce.bfly-fig-combined{ align-items:flex-end; }
  .bfly-fig.bfly-fig-pe.bfly-fig-combined{ align-items:flex-start; }
  .bfly-fig-chg{ font-size:10px; font-weight:600; opacity:.85; }
  .bfly-strike{ text-align:center; font-size:15px; color:#E8EDF2; font-weight:600; }
  .bfly-row.bfly-atm .bfly-strike{ color:#FCC419; }
  .bfly-pcr{ font-size:13px; text-align:left; }
  .bfly-ce-track{ display:flex; justify-content:flex-end; }
  .bfly-pe-track{ display:flex; justify-content:flex-start; }
  .bfly-bar{ height:14px; border-radius:3px; min-width:3px; }
  .bfly-footer{ flex-shrink:0; padding:10px 14px; border-top:1px solid rgba(255,255,255,0.08); font-size:13px; line-height:1.6; }
  .bfly-empty{ padding:24px; text-align:center; color:#5E6B7E; font-size:14px; }
</style>
</head>
<body>
<div class="db">

  <div class="top-nav">
    <div class="nav-brand">
      <span>NIFTY</span>
      <span class="spot-price" id="spotDisplay">—</span>
      <span class="conn-badge down" id="connBadge">● connecting…</span>
    </div>
    <div class="ws-config">
      <label>WS URL</label>
      <input id="wsUrlInput" value="" />
      <button onclick="reconnect()">Reconnect</button>
      <span id="lastMsg">no data yet</span>
    </div>
  </div>

  <div class="tabs-row">
    <div class="tabs" id="tabs">
      <div class="tab active" data-view="bar">Bar Chart</div>
      <div class="tab" data-view="butterfly">Butterfly</div>
      <div class="tab" data-view="gex">GEX</div>
    </div>
    <div class="mode-tabs" id="modeTabs">
      <span class="win-group" id="winGroup">
        <div class="win-tab" data-win="5">5</div>
        <div class="win-tab" data-win="15">15</div>
        <div class="win-tab" data-win="30">30</div>
        <div class="win-tab" data-win="all">Intraday</div>
      </span>
      <div class="mode-tab" data-mode="chg">OI Chg</div>
      <div class="sep"></div>
      <div class="mode-tab active" data-mode="oi">OI</div>
      <div class="mode-tab" data-mode="combined">Combined</div>
    </div>
  </div>

  <div class="legend" id="legendRow"></div>

  <div class="chart-wrap">
    <canvas id="oiCanvas"></canvas>
  </div>

  <div class="bfly-wrap" id="bflyWrap">
    <div class="bfly-colhead"><span>CE</span><span></span><span>Strike</span><span></span><span>PE</span><span>PCR</span></div>
    <div class="bfly-body" id="bflyBody"></div>
    <div class="bfly-footer" id="bflyFooter"></div>
  </div>

</div>

<script src="oi-dashboard.js"></script>
</body>
</html>
